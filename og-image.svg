<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="textG" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#c4b5fd"/>
      <stop offset="60%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="markG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="1200" height="630" fill="#030014"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Orbs -->
  <circle cx="180" cy="180" r="340" fill="url(#orb1)"/>
  <circle cx="1020" cy="540" r="380" fill="url(#orb2)"/>
  <circle cx="900" cy="150" r="220" fill="url(#orb3)"/>

  <!-- Mark (M logo) top-left corner -->
  <g transform="translate(80, 80)">
    <rect width="72" height="72" rx="16" fill="#0a0420" stroke="rgba(255,255,255,0.08)"/>
    <path d="M 18 56 V 20 L 36 42 L 54 20 V 56" fill="none" stroke="url(#markG)" stroke-width="5.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="54" cy="18" r="3" fill="#22d3ee"/>
  </g>

  <!-- Status chip -->
  <g transform="translate(80, 200)">
    <rect x="0" y="0" width="230" height="36" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(103,232,249,0.35)"/>
    <circle cx="18" cy="18" r="4" fill="#22d3ee"/>
    <text x="32" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2" fill="#67e8f9" font-weight="500">EXPERT DIGITAL · 2026</text>
  </g>

  <!-- Headline -->
  <text x="80" y="355" font-family="Space Grotesk, system-ui, sans-serif" font-size="120" font-weight="700" fill="url(#textG)" letter-spacing="-3">Mathieu Parisot.</text>

  <!-- Subhead -->
  <text x="80" y="420" font-family="DM Sans, system-ui, sans-serif" font-size="30" fill="rgba(248,250,252,0.75)" font-weight="400">Je conçois des expériences digitales qui convertissent.</text>

  <!-- Service pills -->
  <g transform="translate(80, 475)" font-family="DM Sans, system-ui, sans-serif" font-size="20" font-weight="500">
    <g>
      <rect x="0" y="0" width="210" height="48" rx="24" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.5)"/>
      <circle cx="22" cy="24" r="5" fill="#a78bfa"/>
      <text x="40" y="31" fill="#c4b5fd">Growth Marketing</text>
    </g>
    <g transform="translate(230, 0)">
      <rect x="0" y="0" width="222" height="48" rx="24" fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.5)"/>
      <circle cx="22" cy="24" r="5" fill="#22d3ee"/>
      <text x="40" y="31" fill="#67e8f9">Web Development</text>
    </g>
    <g transform="translate(472, 0)">
      <rect x="0" y="0" width="130" height="48" rx="24" fill="rgba(236,72,153,0.08)" stroke="rgba(236,72,153,0.5)"/>
      <circle cx="22" cy="24" r="5" fill="#ec4899"/>
      <text x="40" y="31" fill="#f9a8d4">AI Expert</text>
    </g>
  </g>

  <!-- Bottom domain -->
  <text x="80" y="585" font-family="Space Grotesk, system-ui, sans-serif" font-size="18" fill="rgba(248,250,252,0.4)" letter-spacing="4" font-weight="500">MATHIEUPARISOT.ME</text>

  <!-- Bottom aurora -->
  <rect x="0" y="628" width="1200" height="2" fill="url(#markG)" opacity="0.6"/>
</svg>
